<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="96f3p2ktiKwQyjqxvgRvVctkkS51cAyIHIiL3Auz">
    <title>Portal Orang Tua - Mathematalk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0D2B5E',
                        gold: '#F5A623',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#F8FAFC] font-sans" x-data="{ mobileMenu: false }">
    <!-- Header / Navbar -->
    <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 h-20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto h-full px-6 lg:px-12 flex items-center justify-between">
            <a href="/" class="flex items-center py-2">
                <img src="images/logo_light.png" alt="Mathematalk Logo" class="h-12 w-auto">
            </a>

            <!-- Desktop Navigation -->
            <nav class="hidden md:flex items-center space-x-1 lg:space-x-4">
                <a href="/ortu/dashboard" class="px-4 py-2 rounded-xl text-sm font-bold transition-all  text-gray-600 hover:text-navy hover:bg-gray-50 ">
                    Beranda
                </a>
                <a href="/ortu/kelas" class="px-4 py-2 rounded-xl text-sm font-bold transition-all  text-gray-600 hover:text-navy hover:bg-gray-50 ">
                    Kelas Anak
                </a>
                <a href="/ortu/anak" class="px-4 py-2 rounded-xl text-sm font-bold transition-all  text-gray-600 hover:text-navy hover:bg-gray-50 ">
                    Daftar Anak
                </a>
                <a href="/ortu/invoices" class="px-4 py-2 rounded-xl text-sm font-bold transition-all  bg-navy text-white shadow-lg shadow-navy/20 ">
                    Tagihan
                </a>
                <a href="/ortu/profile" class="px-4 py-2 rounded-xl text-sm font-bold transition-all  text-gray-600 hover:text-navy hover:bg-gray-50 ">
                    Profil Saya
                </a>
            </nav>

            <!-- User Profile / Logout -->
            <div class="flex items-center space-x-4">
                <div class="text-right hidden lg:block">
                    <p class="text-[10px] text-gray-600 font-bold leading-none mb-1 uppercase tracking-wider">Selamat Datang,</p>
                    <span class="font-bold text-sm text-navy">Nafis Nyoba</span>
                </div>
                <div class="h-8 w-[1px] bg-gray-100 mx-2 hidden md:block"></div>
                <form action="#" method="POST" id="logout-form" class="hidden">
                    <input type="hidden" name="_token" value="96f3p2ktiKwQyjqxvgRvVctkkS51cAyIHIiL3Auz" autocomplete="off">                </form>
                <button onclick="localStorage.removeItem('mathematalk_token'); document.getElementById('logout-form').submit();" class="hidden md:block text-xs font-bold text-red-500 hover:text-red-600 transition-colors bg-red-50 px-3 py-2 rounded-lg">Logout</button>
                
                <!-- Mobile Menu Button -->
                <button @click="mobileMenu = !mobileMenu" class="md:hidden p-2 text-navy hover:bg-gray-50 rounded-xl transition-colors">
                    <svg x-show="!mobileMenu" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                    <svg x-show="mobileMenu" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display: none;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Navigation Menu -->
        <div x-show="mobileMenu" 
             x-transition:enter="transition ease-out duration-200" 
             x-transition:enter-start="opacity-0 -translate-y-4" 
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150" 
             x-transition:leave-start="opacity-100 translate-y-0" 
             x-transition:leave-end="opacity-0 -translate-y-4"
             class="md:hidden bg-white border-b border-gray-100 shadow-2xl absolute inset-x-0 top-full z-50 p-6"
             style="display: none;"
             @click.away="mobileMenu = false">
            <div class="space-y-4">
                <div class="pb-4 mb-4 border-b border-gray-50">
                    <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest mb-1">Akun Saya</p>
                    <p class="font-bold text-navy">Nafis Nyoba</p>
                </div>
                <a href="/ortu/dashboard" class="flex items-center space-x-3 p-3 rounded-xl font-bold  text-gray-500 hover:bg-gray-50 ">
                    <span>🏠</span>
                    <span>Beranda</span>
                </a>
                <a href="/ortu/kelas" class="flex items-center space-x-3 p-3 rounded-xl font-bold  text-gray-500 hover:bg-gray-50 ">
                    <span>🏫</span>
                    <span>Kelas Anak</span>
                </a>
                <a href="/ortu/anak" class="flex items-center space-x-3 p-3 rounded-xl font-bold  text-gray-500 hover:bg-gray-50 ">
                    <span>👦</span>
                    <span>Daftar Anak</span>
                </a>
                <a href="/ortu/invoices" class="flex items-center space-x-3 p-3 rounded-xl font-bold  bg-navy text-white ">
                    <span>🧾</span>
                    <span>Tagihan</span>
                </a>
                <a href="/ortu/profile" class="flex items-center space-x-3 p-3 rounded-xl font-bold  text-gray-500 hover:bg-gray-50 ">
                    <span>👤</span>
                    <span>Profil Saya</span>
                </a>
                <div class="pt-4 mt-4 border-t border-gray-50">
                    <button onclick="localStorage.removeItem('mathematalk_token'); document.getElementById('logout-form').submit();" class="w-full flex items-center space-x-3 p-3 rounded-xl font-bold text-red-500 hover:bg-red-50">
                        <span>🚪</span>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 lg:px-12 py-10 min-h-[calc(100vh-5rem)]">
        <div x-data="{
    items: [],
    loading: true,
    async init() {
        this.fetchData();
    },
    async fetchData() {
        this.loading = true;
        const res = await apiGet('/api/v1/ortu/invoices');
        if (res && res.data) {
            this.items = res.data.data;
        }
        this.loading = false;
    },
    async pay(id) {
        try {
            const res = await apiPost('/api/v1/ortu/invoices/' + id + '/pay', {
                payment_method: 'QRIS' // Default to QRIS payment
            });
            if (res && res.status === 'success' && res.data.checkout_url) {
                // Redirect directly to DOKU checkout
                window.location.href = res.data.checkout_url;
            } else {
                window.dispatchEvent(new CustomEvent('toast', { detail: { message: 'Pembayaran gagal! Silakan coba lagi.', type: 'error' } }));
            }
        } catch (error) {
            console.error('Payment error:', error);
            window.dispatchEvent(new CustomEvent('toast', { detail: { message: 'Pembayaran gagal! Silakan coba lagi.', type: 'error' } }));
        }
    }
}" x-cloak>
<div
    x-data="{
        messages: [],
        remove(id) {
            this.messages = this.messages.filter(m => m.id !== id)
        },
        add(message, type = 'success', duration = 3000) {
            console.log('Toast add called:', { message, type, duration });
            const id = Date.now()
            this.messages.push({ id, message, type })
            // Only auto-remove if duration is a positive number
            if (duration && duration > 0) {
                setTimeout(() => this.remove(id), duration)
            }
        }
    }"
    @toast.window="add($event.detail.message, $event.detail.type, $event.detail.duration)"
    class="fixed top-6 right-6 z-[100] flex flex-col space-y-3 pointer-events-none max-w-md"
>
    <template x-for="msg in messages" :key="msg.id">
        <div
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="translate-x-full opacity-0"
            x-transition:enter-end="translate-x-0 opacity-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="translate-x-full opacity-0"
            :class="{
                'bg-green-600': msg.type === 'success',
                'bg-red-600': msg.type === 'error',
                'bg-yellow-500': msg.type === 'warning',
                'bg-blue-600': msg.type === 'info'
            }"
            class="pointer-events-auto px-6 py-4 rounded-lg text-white shadow-2xl flex items-center space-x-3 font-medium backdrop-blur-sm bg-opacity-95 animate-pulse-once"
        >
            <span x-text="{
                'success': '✅',
                'error': '❌',
                'warning': '⚠️',
                'info': 'ℹ️'
            }[msg.type] || '✅'" class="text-lg flex-shrink-0"></span>
            <p x-text="msg.message" class="flex-1 text-sm md:text-base"></p>
            <button @click="remove(msg.id)" class="ml-2 hover:opacity-80 transition opacity-70 hover:opacity-100 flex-shrink-0 text-lg">✕</button>
        </div>
    </template>
</div>
    <div class="mb-10">
        <h2 class="text-3xl font-black text-navy leading-tight">Tagihan Belajar 🧾</h2>
        <p class="text-gray-500 font-medium mt-1">Kelola pembayaran biaya belajar buah hati Anda secara transparan.</p>
    </div>

    <div class="bg-white rounded-[2.5rem] shadow-xl shadow-navy/5 border border-gray-50 overflow-hidden">
        <div class="overflow-x-auto text-navy">
            <table class="w-full text-left border-collapse">
                <thead class="bg-[#F8FAFC]">
                    <tr>
                        <th class="px-8 py-6 text-[10px] font-black text-gray-600 uppercase tracking-[0.2em]">Invoice
                        </th>
                        <th class="px-8 py-6 text-[10px] font-black text-gray-600 uppercase tracking-[0.2em]">Kelas</th>
                        <th class="px-8 py-6 text-[10px] font-black text-gray-600 uppercase tracking-[0.2em]">Total</th>
                        <th class="px-8 py-6 text-[10px] font-black text-gray-600 uppercase tracking-[0.2em]">Status
                        </th>
                        <th class="px-8 py-6 text-[10px] font-black text-gray-600 uppercase tracking-[0.2em]">Tempo</th>
                        <th
                            class="px-8 py-6 text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] text-center">
                            Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <template x-if="loading">
                        <template x-for="i in 3">
                            <tr class="animate-pulse">
                                <td colspan="6" class="px-8 py-8 h-20 bg-gray-50/20"></td>
                            </tr>
                        </template>
                    </template>
                    <template x-if="!loading && items.length === 0">
                        <tr>
                            <td colspan="6" class="px-8 py-24 text-center">
                                <div
                                    class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                                    📜</div>
                                <p class="text-navy font-bold">Belum ada tagihan saat ini</p>
                                <p class="text-gray-600 text-sm mt-1">Semua riwayat pembayaran akan muncul di sini.</p>
                            </td>
                        </tr>
                    </template>
                    <template x-if="!loading && items.length > 0">
                        <template x-for="inv in items" :key="inv.id">
                            <tr class="hover:bg-gray-50 transition-colors group">
                                <td class="px-8 py-7">
                                    <div class="font-black text-navy text-sm" x-text="inv.nomor_invoice"></div>
                                    <div x-show="inv.paid_at"
                                        class="text-[9px] text-green-600 font-black mt-1.5 flex items-center gap-1">
                                        <span class="w-1 h-1 bg-green-500 rounded-full"></span>
                                        LUNAS: <span x-text="new Date(inv.paid_at).toLocaleDateString()"></span>
                                    </div>
                                </td>
                                <td class="px-8 py-7">
                                    <div class="text-sm font-bold text-navy/80" x-text="inv.kelas.nama_kelas"></div>
                                    <div class="text-[10px] text-gray-600 font-medium mt-0.5"
                                        x-text="inv.kelas.guru ? inv.kelas.guru.name : '-'"></div>
                                </td>
                                <td class="px-8 py-7">
                                    <div class="font-black text-navy text-base"
                                        x-text="'Rp ' + inv.total_tagihan.toLocaleString()"></div>
                                </td>
                                <td class="px-8 py-7">
                                    <span :class="{
                                            'bg-green-50 text-green-600': inv.status === 'lunas',
                                            'bg-red-50 text-red-600': inv.status === 'overdue',
                                            'bg-gold/10 text-gold': ['menunggu', 'terkirim'].includes(inv.status),
                                            'bg-gray-50 text-gray-600': inv.status === 'draft'
                                        }"
                                        class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest inline-block"
                                        x-text="inv.status"></span>
                                </td>
                                <td class="px-8 py-7 text-xs text-gray-600 font-bold"
                                    x-text="new Date(inv.jatuh_tempo).toLocaleDateString()"></td>
                                <td class="px-8 py-7">
                                    <div class="flex items-center justify-center gap-3">
                                        <template x-if="['menunggu', 'terkirim', 'overdue'].includes(inv.status)">
                                            <button @click="pay(inv.id)"
                                                class="bg-navy text-white px-5 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-gold hover:text-navy hover:-translate-y-0.5 transition-all shadow-lg shadow-navy/10">Bayar</button>
                                        </template>
                                        <a :href="'/api/v1/invoices/' + inv.id + '/download'" target="_blank"
                                            class="w-10 h-10 flex items-center justify-center bg-gray-50 text-gray-600 hover:bg-navy hover:text-white rounded-xl transition-all"
                                            title="Download PDF">
                                            <span class="text-xl">📄</span>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>

    </main>



    <script>
        window.__API_TOKEN = null;
        // Also check for cookie if session token is not available
        if (!window.__API_TOKEN && document.cookie) {
            const cookies = document.cookie.split(';');
            const mathematalkCookie = cookies.find(c => c.trim().startsWith('mathematalk_token='));
            if (mathematalkCookie) {
                // Split only on first '=' to handle tokens that contain '=' characters
                const cookieParts = mathematalkCookie.trim().split('=');
                window.__API_TOKEN = cookieParts.slice(1).join('=');
            }
        }
    </script>
    <script src="js/app.js"></script>
    </body>
</html>
