    <main class="max-w-7xl mx-auto px-6 lg:px-12 py-10 min-h-[calc(100vh-5rem)]">
        <div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <h2 class="text-2xl font-black text-navy">Ganti Password</h2>
        <p class="text-gray-500">Ubah password akun Anda untuk keamanan.</p>
    </div>

    <div x-data="{
    form: {
        current_password: '',
        password: '',
        password_confirmation: ''
    },
    showCurrent: false,
    showNew: false,
    showConfirm: false,
    saving: false,
    errors: {},

    async submit() {
        this.errors = {};
        this.saving = true;

        try {
            const res = await apiPost('/api/v1/auth/change-password', this.form);
            if (res && res.success) {
                window.dispatchEvent(new CustomEvent('toast', { detail: { message: 'Password berhasil diubah!', type: 'success' } }));
                this.form = { current_password: '', password: '', password_confirmation: '' };
            } else {
                window.dispatchEvent(new CustomEvent('toast', { detail: { message: res?.message || 'Gagal mengubah password.', type: 'error' } }));
            }
        } catch (e) {
            const data = e.response?.data;
            if (data?.errors) {
                this.errors = data.errors;
            }
            window.dispatchEvent(new CustomEvent('toast', { detail: { message: data?.message || 'Terjadi kesalahan.', type: 'error' } }));
        }

        this.saving = false;
    }
}" class="bg-gray-50 rounded-2xl p-5">
    
    <div class="mb-4">
        <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">Password Saat Ini</label>
        <div class="relative">
            <input :type="showCurrent ? 'text' : 'password'"
                   x-model="form.current_password"
                   placeholder="Masukkan password saat ini"
                   class="w-full bg-white text-gray-800 border-none rounded-xl px-4 py-3 pr-10 focus:ring-2 focus:ring-gold focus:text-gray-900 font-medium text-sm placeholder-gray-400">
            <button type="button" @click="showCurrent = !showCurrent"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <span x-text="showCurrent ? '🙈' : '👁️'"></span>
            </button>
        </div>
        <template x-if="errors.current_password">
            <p class="text-red-500 text-xs mt-1" x-text="errors.current_password"></p>
        </template>
    </div>

    
    <div class="mb-4">
        <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">Password Baru</label>
        <div class="relative">
            <input :type="showNew ? 'text' : 'password'"
                   x-model="form.password"
                   placeholder="Minimal 8 karakter"
                   class="w-full bg-white text-gray-800 border-none rounded-xl px-4 py-3 pr-10 focus:ring-2 focus:ring-gold focus:text-gray-900 font-medium text-sm placeholder-gray-400">
            <button type="button" @click="showNew = !showNew"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <span x-text="showNew ? '🙈' : '👁️'"></span>
            </button>
        </div>
        <template x-if="errors.password">
            <p class="text-red-500 text-xs mt-1" x-text="errors.password"></p>
        </template>
    </div>

    
    <div class="mb-5">
        <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">Konfirmasi Password Baru</label>
        <div class="relative">
            <input :type="showConfirm ? 'text' : 'password'"
                   x-model="form.password_confirmation"
                   placeholder="Ketik ulang password baru"
                   class="w-full bg-white text-gray-800 border-none rounded-xl px-4 py-3 pr-10 focus:ring-2 focus:ring-gold focus:text-gray-900 font-medium text-sm placeholder-gray-400">
            <button type="button" @click="showConfirm = !showConfirm"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                <span x-text="showConfirm ? '🙈' : '👁️'"></span>
            </button>
        </div>
        <template x-if="errors.password_confirmation">
            <p class="text-red-500 text-xs mt-1" x-text="errors.password_confirmation"></p>
        </template>
    </div>

    
    <button @click="submit()"
            :disabled="saving || !form.current_password || !form.password || !form.password_confirmation"
            class="w-full py-3 rounded-xl font-bold transition disabled:opacity-50
                   bg-navy text-white hover:bg-opacity-90">
        <span x-show="!saving">🔒 Ganti Password</span>
        <span x-show="saving">Memproses...</span>
    </button>
</div>

    <div class="mt-6 text-center">
        <a href="/ortu/profile" class="text-navy font-bold text-sm hover:underline">
            ← Kembali ke Profil
        </a>
    </div>
</div>

<div
    x-data="{
        messages: [],
        remove(id) {
            this.messages = this.messages.filter(m => m.id !== id)
        },
        add(message, type = 'success', duration = 3000) {
            console.log('Toast add called:', { message, type, duration });
            const id = Date.now()
            this.messages.push({ id, message, type })
            // Only auto-remove if duration is a positive number
            if (duration && duration > 0) {
                setTimeout(() => this.remove(id), duration)
            }
        }
    }"
    @toast.window="add($event.detail.message, $event.detail.type, $event.detail.duration)"
    class="fixed top-6 right-6 z-[100] flex flex-col space-y-3 pointer-events-none max-w-md"
>
    <template x-for="msg in messages" :key="msg.id">
        <div
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="translate-x-full opacity-0"
            x-transition:enter-end="translate-x-0 opacity-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="translate-x-full opacity-0"
            :class="{
                'bg-green-600': msg.type === 'success',
                'bg-red-600': msg.type === 'error',
                'bg-yellow-500': msg.type === 'warning',
                'bg-blue-600': msg.type === 'info'
            }"
            class="pointer-events-auto px-6 py-4 rounded-lg text-white shadow-2xl flex items-center space-x-3 font-medium backdrop-blur-sm bg-opacity-95 animate-pulse-once"
        >
            <span x-text="{
                'success': '✅',
                'error': '❌',
                'warning': '⚠️',
                'info': 'ℹ️'
            }[msg.type] || '✅'" class="text-lg flex-shrink-0"></span>
            <p x-text="msg.message" class="flex-1 text-sm md:text-base"></p>
            <button @click="remove(msg.id)" class="ml-2 hover:opacity-80 transition opacity-70 hover:opacity-100 flex-shrink-0 text-lg">✕</button>
        </div>
    </template>
</div>
    </main>



    <script>
        window.__API_TOKEN = null;
        // Also check for cookie if session token is not available
        if (!window.__API_TOKEN && document.cookie) {
            const cookies = document.cookie.split(';');
            const mathematalkCookie = cookies.find(c => c.trim().startsWith('mathematalk_token='));
            if (mathematalkCookie) {
                // Split only on first '=' to handle tokens that contain '=' characters
                const cookieParts = mathematalkCookie.trim().split('=');
                window.__API_TOKEN = cookieParts.slice(1).join('=');
            }
        }
    </script>
    <script src="js/app.js"></script>
    </body>
