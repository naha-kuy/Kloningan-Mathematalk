    data: { active_classes: [], pending_invoices: [] },
    loading: true,
    error: null,
    async init() {
        try {
            const res = await apiGet('/api/v1/ortu/dashboard');
            if (res && res.data) {
                this.data = res.data;
            }
        } catch (e) {
            console.error('Failed to load dashboard:', e);
            this.error = 'Gagal memuat data dashboard';
        } finally {
            this.loading = false;
        }
    },
    formatStatus(status) {
        const statusMap = {
            'menunggu': 'Menunggu Pembayaran',
            'draft': 'Draft',
            'lunas': 'Lunas',
            'overdue': 'Terlambat',
            'batal': 'Dibatalkan'
        };
        return statusMap[status] || status;
    },
    getStatusColor(status) {
        const colorMap = {
            'menunggu': 'bg-gold/10 text-gold',
            'draft': 'bg-gray-100 text-gray-600',
            'lunas': 'bg-green-50 text-green-600',
            'overdue': 'bg-red-50 text-red-600',
            'batal': 'bg-gray-50 text-gray-500'
        };
        return colorMap[status] || 'bg-gray-100 text-gray-600';
    }
}" x-cloak>

    <script>
        window.__API_TOKEN = null;
        // Also check for cookie if session token is not available
        if (!window.__API_TOKEN && document.cookie) {
            const cookies = document.cookie.split(';');
            const mathematalkCookie = cookies.find(c => c.trim().startsWith('mathematalk_token='));
            if (mathematalkCookie) {
                // Split only on first '=' to handle tokens that contain '=' characters
                const cookieParts = mathematalkCookie.trim().split('=');
                window.__API_TOKEN = cookieParts.slice(1).join('=');
            }
        }
    </script>
